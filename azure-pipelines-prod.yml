# ──────────────────────────────────────────────────────────────────────────────
#  IAMOneStop — PRODUCTION Pipeline
#  Triggered on every push to the `main` branch (which represents a release).
#  The recommended workflow:
#    1. Develop & test on `dev` branch (Dev pipeline)
#    2. Raise a Pull Request from `dev` → `main`
#    3. After PR is approved & merged, this pipeline fires automatically
#    4. Optionally create a git tag (v1.x.x) to mark the release version
#
#  Required Pipeline Variables (set in Azure DevOps → Pipelines → Variables):
#    AZURE_SERVICE_CONNECTION  — Azure DevOps service connection name
#    PROD_WEBAPP_NAME          — Azure App Service name for Prod (e.g. iamone-prod)
#    NEXTAUTH_URL              — Public URL of the Prod app (e.g. https://iamone-prod.azurewebsites.net)
#    NEXTAUTH_SECRET           — Random secret (mark as secret)
#    AZURE_AD_CLIENT_ID        — Entra App Registration Client ID
#    AZURE_AD_CLIENT_SECRET    — Entra App Registration Client Secret (mark as secret)
#    AZURE_AD_TENANT_ID        — Entra Tenant ID
# ──────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
  tags:
    include:
      - v*        # also triggers on version tags like v1.0.0, v1.1.0, etc.

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: "20.x"
  BUILD_LABEL: "prod-$(Build.BuildNumber)"

stages:

# ── Stage 1: Build & Validate ─────────────────────────────────────────────────
- stage: Build
  displayName: "Build & Validate"
  jobs:
  - job: Build
    displayName: "Install → Type-check → Lint → Build"
    steps:

    - task: NodeTool@0
      displayName: "Use Node.js $(NODE_VERSION)"
      inputs:
        versionSpec: "$(NODE_VERSION)"

    - script: npm ci
      displayName: "npm ci (clean install)"

    - script: npx prisma generate
      displayName: "Generate Prisma client"

    - script: npx tsc --noEmit
      displayName: "TypeScript type-check"
      # In production, type errors are blocking — no continueOnError

    - script: npm run lint
      displayName: "ESLint"

    - script: npm run build
      displayName: "Next.js production build"
      env:
        DATABASE_URL: "file:/tmp/build.db"
        NEXTAUTH_URL: $(NEXTAUTH_URL)
        NEXTAUTH_SECRET: $(NEXTAUTH_SECRET)
        AZURE_AD_CLIENT_ID: $(AZURE_AD_CLIENT_ID)
        AZURE_AD_CLIENT_SECRET: $(AZURE_AD_CLIENT_SECRET)
        AZURE_AD_TENANT_ID: $(AZURE_AD_TENANT_ID)

    - script: npm prune --production
      displayName: "Prune dev dependencies"

    - task: ArchiveFiles@2
      displayName: "Create deployment archive"
      inputs:
        rootFolderOrFile: "$(System.DefaultWorkingDirectory)"
        includeRootFolder: false
        archiveType: zip
        archiveFile: "$(Build.ArtifactStagingDirectory)/$(BUILD_LABEL).zip"
        replaceExistingArchive: true
        exclude: |
          .git/**
          .next/cache/**
          src/**
          tests/**
          .env
          .env.*
          !.env.example
          prisma/*.db
          prisma/*.db-journal
          *.log
          .claude/**
          coverage/**

    - publish: "$(Build.ArtifactStagingDirectory)/$(BUILD_LABEL).zip"
      artifact: drop
      displayName: "Publish artifact"

# ── Stage 2: Deploy to Production (with manual approval gate) ─────────────────
- stage: Deploy
  displayName: "Deploy → Production"
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployProd
    displayName: "Deploy to Production App Service"
    # The 'production' environment should have an approval check configured
    # in Azure DevOps → Environments → production → Approvals and checks
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: "Deploy to $(PROD_WEBAPP_NAME)"
            inputs:
              azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
              appType: webAppLinux
              appName: "$(PROD_WEBAPP_NAME)"
              package: "$(Pipeline.Workspace)/drop/$(BUILD_LABEL).zip"
              runtimeStack: "NODE|20-lts"
              startUpCommand: "bash startup.sh"
              appSettings: |
                -NODE_ENV production
                -DATABASE_URL file:/home/data/app.db
                -NEXTAUTH_URL $(NEXTAUTH_URL)
                -NEXTAUTH_SECRET $(NEXTAUTH_SECRET)
                -AZURE_AD_CLIENT_ID $(AZURE_AD_CLIENT_ID)
                -AZURE_AD_CLIENT_SECRET $(AZURE_AD_CLIENT_SECRET)
                -AZURE_AD_TENANT_ID $(AZURE_AD_TENANT_ID)
                -ENVIRONMENT production

# ── Stage 3: Tag the release ──────────────────────────────────────────────────
- stage: Tag
  displayName: "Tag Release"
  dependsOn: Deploy
  condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: TagRelease
    displayName: "Create git tag for this build"
    steps:
    - checkout: self
      persistCredentials: true

    - script: |
        VERSION=$(node -p "require('./package.json').version")
        BUILD=$(echo "$BUILD_BUILDNUMBER" | tr '.' '-')
        TAG="v${VERSION}-build-${BUILD}"
        git config user.email "devops@pipeline.local"
        git config user.name "Azure DevOps Pipeline"
        git tag "$TAG" -m "Production release $TAG"
        git push origin "$TAG"
        echo "##vso[task.setvariable variable=RELEASE_TAG]$TAG"
        echo "Tagged release: $TAG"
      displayName: "Tag release in git"
      env:
        BUILD_BUILDNUMBER: $(Build.BuildNumber)
